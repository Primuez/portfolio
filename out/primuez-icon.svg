<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="gc">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ga">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark bg rounded square -->
  <rect width="64" height="64" rx="12" fill="#070b12"/>

  <!-- Faint grid lines -->
  <line x1="0" y1="32" x2="64" y2="32" stroke="rgba(0,240,255,0.05)" stroke-width="0.5"/>
  <line x1="32" y1="0" x2="32" y2="64" stroke="rgba(0,240,255,0.05)" stroke-width="0.5"/>

  <!-- Outer hexagon -->
  <polygon points="32,5 52,16 52,38 32,49 12,38 12,16" fill="none" stroke="#00f0ff" stroke-width="1.5" filter="url(#gc)"/>

  <!-- Inner hex faint fill -->
  <polygon points="32,10 48,19 48,37 32,46 16,37 16,19" fill="rgba(0,240,255,0.05)" stroke="rgba(0,240,255,0.2)" stroke-width="0.5"/>

  <!-- Center node -->
  <circle cx="32" cy="27" r="4" fill="#00f0ff" filter="url(#gc)"/>

  <!-- Circuit lines from center -->
  <line x1="32" y1="27" x2="32" y2="10" stroke="#00f0ff" stroke-width="1.2" opacity="0.7"/>
  <line x1="32" y1="27" x2="48" y2="19" stroke="#00f0ff" stroke-width="1.2" opacity="0.7"/>
  <line x1="32" y1="27" x2="48" y2="37" stroke="rgba(0,240,255,0.3)" stroke-width="0.8"/>
  <line x1="32" y1="27" x2="16" y2="37" stroke="#f5a623" stroke-width="1.2" opacity="0.9" filter="url(#ga)"/>
  <line x1="32" y1="27" x2="16" y2="19" stroke="rgba(0,240,255,0.3)" stroke-width="0.8"/>
  <line x1="32" y1="27" x2="32" y2="49" stroke="rgba(0,240,255,0.3)" stroke-width="0.8"/>

  <!-- Corner node dots -->
  <circle cx="32" cy="10" r="2.2" fill="#00f0ff" opacity="0.9"/>
  <circle cx="48" cy="19" r="2.2" fill="#00f0ff" opacity="0.9"/>
  <circle cx="16" cy="37" r="3" fill="#f5a623" filter="url(#ga)"/>

  <!-- Small corner marks -->
  <line x1="12" y1="16" x2="6" y2="12" stroke="rgba(0,240,255,0.3)" stroke-width="0.7"/>
  <line x1="52" y1="16" x2="58" y2="12" stroke="rgba(0,240,255,0.3)" stroke-width="0.7"/>

  <!-- "P" letterform subtle -->
  <text x="32" y="59" font-family="'Space Mono', monospace" font-size="7" font-weight="700" fill="rgba(0,240,255,0.35)" text-anchor="middle" letter-spacing="2">PRIMUEZ</text>
</svg>