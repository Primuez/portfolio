<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 80" width="420" height="80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;display=swap');
    </style>
    <filter id="glow-c">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-a">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon mark: stylized P hex -->
  <!-- Outer hex -->
  <polygon points="34,6 54,6 64,23 54,40 34,40 24,23" fill="none" stroke="#00f0ff" stroke-width="1.5" filter="url(#glow-c)"/>
  <!-- Inner hex -->
  <polygon points="36,11 52,11 60,23 52,35 36,35 28,23" fill="rgba(0,240,255,0.06)" stroke="#00f0ff" stroke-width="0.6" opacity="0.5"/>
  <!-- Circuit node dot -->
  <circle cx="44" cy="23" r="3.5" fill="#00f0ff" filter="url(#glow-c)"/>
  <!-- Circuit lines from center -->
  <line x1="44" y1="23" x2="44" y2="11" stroke="#00f0ff" stroke-width="1" opacity="0.7"/>
  <line x1="44" y1="23" x2="60" y2="23" stroke="#00f0ff" stroke-width="1" opacity="0.7"/>
  <line x1="44" y1="23" x2="36" y2="35" stroke="#f5a623" stroke-width="1" opacity="0.85" filter="url(#glow-a)"/>
  <!-- Node dots -->
  <circle cx="44" cy="11" r="2" fill="#00f0ff" opacity="0.8"/>
  <circle cx="60" cy="23" r="2" fill="#00f0ff" opacity="0.8"/>
  <circle cx="36" cy="35" r="2.5" fill="#f5a623" filter="url(#glow-a)"/>
  <!-- Corner tick marks -->
  <line x1="24" y1="23" x2="19" y2="23" stroke="#00f0ff" stroke-width="0.8" opacity="0.4"/>
  <line x1="54" y1="6" x2="57" y2="2" stroke="#00f0ff" stroke-width="0.8" opacity="0.4"/>

  <!-- PRIMUEZ wordmark -->
  <text x="80" y="32" font-family="'Space Mono', 'Courier New', monospace" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="5" filter="url(#glow-c)" opacity="0.95">PRIMUEZ</text>

  <!-- Tagline -->
  <text x="81" y="51" font-family="'Space Mono', 'Courier New', monospace" font-size="8.5" font-weight="400" fill="#00f0ff" letter-spacing="4" opacity="0.65">AI SYSTEMS BUILDER</text>

  <!-- Separator line between icon and text -->
  <line x1="72" y1="8" x2="72" y2="46" stroke="rgba(0,240,255,0.2)" stroke-width="0.75"/>
</svg>